# 64_CICD.md / 60_DEPLOYMENT.md §8 — every commit runs the test suite.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with API extra)
        run: pip install -e ".[dev,api]"
      - name: Run tests
        run: python -m pytest -q
      - name: Build Docker image
        run: docker build -t detective-monkey:ci .
